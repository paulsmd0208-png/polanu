let _syncTimer=null;
let _syncStatus=null;

async function cloudLoad(){
  try{
    const r=await fetch(JB_URL+"/latest",{headers:{"X-Master-Key":JB_KEY}});
    if(!r.ok)return null;
    const d=await r.json();
    return d.record||null;
  }catch(e){console.error("Cloud load error",e);return null;}
}

async function cloudSave(data){
  try{
    const r=await fetch(JB_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){console.error("Cloud save error",e);return false;}
}

function scheduleSave(data){
  if(_syncTimer)clearTimeout(_syncTimer);
  if(_syncStatus)_syncStatus("saving");
  _syncTimer=setTimeout(async()=>{
    const ok=await cloudSave(data);
    if(_syncStatus)_syncStatus(ok?"saved":"error");
  },2000);
}

// File to dataURL helper
// IndexedDB for large media (videos up to 100MB)
const IDB={
  _db:null,
  open(){return new Promise((res,rej)=>{if(this._db)return res(this._db);const r=indexedDB.open("polanu-media",1);r.onupgradeneeded=e=>{e.target.result.createObjectStore("media")};r.onsuccess=e=>{this._db=e.target.result;res(this._db)};r.onerror=e=>rej(e)})},
  async set(key,val){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("media","readwrite");tx.objectStore("media").put(val,key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})},
  async get(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("media","readonly");const r=tx.objectStore("media").get(key);r.onsuccess=()=>res(r.result||null);r.onerror=e=>rej(e)})},
  async del(key){const db=await this.open();return new Promise((res,rej)=>{const tx=db.transaction("media","readwrite");tx.objectStore("media").delete(key);tx.oncomplete=()=>res();tx.onerror=e=>rej(e)})},
  async size(){const db=await this.open();return new Promise((res)=>{const tx=db.transaction("media","readonly");const store=tx.objectStore("media");const r=store.getAll();r.onsuccess=()=>{let s=0;(r.result||[]).forEach(v=>{s+=v?.length||0});res(s)};r.onerror=()=>res(0)})}
};

function pickFile(accept,cb){const i=document.createElement("input");i.type="file";i.accept=accept;i.onchange=e=>{const f=e.target.files[0];if(!f)return;if(f.size>100*1024*1024){alert("Datei zu groß (max 100MB)");return}const r=new FileReader();r.onload=ev=>{const data=ev.target.result;if(f.size>4*1024*1024){const key="media_"+uid();IDB.set(key,data).then(()=>cb("idb:"+key,f.name)).catch(()=>{alert("Speicherfehler");cb(data,f.name)})}else{cb(data,f.name)}};r.readAsDataURL(f)};i.click()}

// ═══ Media Preview with local file support ═══
function MP({url,data,type}){
  const raw=data||url;
  const [src,setSrc]=useState(null);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!raw){setSrc(null);return}
    if(raw.startsWith("idb:")){setLoading(true);IDB.get(raw.slice(4)).then(v=>{setSrc(v);setLoading(false)}).catch(()=>setLoading(false))}
    else{setSrc(raw)}
  },[raw]);
  if(!raw)return null;
  if(loading)return <div className="media-box" style={{padding:20,textAlign:"center",color:"var(--t3)"}}>Lade Media...</div>;
  if(!src)return null;
  const isVid=type==="video"||/\.(mp4|webm|mov)(\?|$)/i.test(src)||src.startsWith("data:video");
  return <div className="media-box">
    {isVid?(src.startsWith("data:")||/\.(mp4|webm|mov)(\?|$)/i.test(src)?
      <video src={src} controls style={{width:"100%",maxHeight:280,display:"block"}}/>:
      <a href={src} target="_blank" style={{display:"flex",alignItems:"center",gap:8,padding:14,color:"#818cf8",fontSize:13,textDecoration:"none"}}>▶ Video öffnen →</a>
    ):<img className="preview" src={src} alt="" onError={e=>{e.target.parentElement.innerHTML='<div style="padding:14px;color:var(--t3);font-size:12px">Bild nicht ladbar</div>'}}/>}
  </div>;
}

  const importB=()=>{const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.products)sp(d.products);if(d.todos)sto(d.todos);if(d.notes)sn(d.notes);if(d.ads)sa(d.ads);if(d.boards)sbo(d.boards);if(d.swipe)ssw(d.swipe);if(d.tags)stg(d.tags);if(d.avatars){sav(d.avatars);LS.set("avatars",d.avatars)}if(d.settings){setSettings(d.settings);LS.set("settings",d.settings)}alert("Backup importiert!")}catch{alert("Fehler")}};r.readAsText(f)};i.click()};

// ═══ PRODUCTS ═══
function PV({products,set}){
  const [vw,setVw]=useState("list");const [aid,setAid]=useState(null);const [ec,setEc]=useState({});const [ea,setEa]=useState({});const [did,setDid]=useState(null);
  const act=products.find(p=>p.id===aid);
  const up=(id,ch)=>set(products.map(p=>p.id===id?{...p,...ch}:p));
  const add=()=>{const p=mk.product();set([...products,p]);setAid(p.id);setVw("detail")};
  const del=id=>{set(products.filter(p=>p.id!==id));if(aid===id)setVw("list");setDid(null)};

  // Competitor ops
  const aC=pid=>{const p=products.find(x=>x.id===pid);const c=mk.comp();up(pid,{competitors:[...p.competitors,c]});setEc(pr=>({...pr,[c.id]:true}))};
  const uC=(pid,cid,ch)=>{const p=products.find(x=>x.id===pid);up(pid,{competitors:p.competitors.map(c=>c.id===cid?{...c,...ch}:c)})};
  const dC=(pid,cid)=>{const p=products.find(x=>x.id===pid);up(pid,{competitors:p.competitors.filter(c=>c.id!==cid)})};

  // Account ops (inside competitor)
  const aAcc=(pid,cid)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);const a=mk.account();uC(pid,cid,{accounts:[...(c.accounts||[]),a]});setEa(pr=>({...pr,[a.id]:true}))};
  const uAcc=(pid,cid,accid,ch)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);uC(pid,cid,{accounts:(c.accounts||[]).map(a=>a.id===accid?{...a,...ch}:a)})};
  const dAcc=(pid,cid,accid)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);uC(pid,cid,{accounts:(c.accounts||[]).filter(a=>a.id!==accid)})};

  // Ad entry ops (inside account)
  const aAE=(pid,cid,accid)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);const acc=(c.accounts||[]).find(a=>a.id===accid);uAcc(pid,cid,accid,{adHistory:[...acc.adHistory,mk.ae()]})};
  const uAE=(pid,cid,accid,eid,ch)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);const acc=(c.accounts||[]).find(a=>a.id===accid);uAcc(pid,cid,accid,{adHistory:acc.adHistory.map(e=>e.id===eid?{...e,...ch}:e)})};
  const dAE=(pid,cid,accid,eid)=>{const p=products.find(x=>x.id===pid);const c=p.competitors.find(x=>x.id===cid);const acc=(c.accounts||[]).find(a=>a.id===accid);uAcc(pid,cid,accid,{adHistory:acc.adHistory.filter(e=>e.id!==eid)})};

  if(vw==="detail"&&act){const p=act;const{m,r}=cM(p.sellPrice,p.buyPrice);return <div className="pg">
    <div className="tp"><button className="bb" onClick={()=>setVw("list")}>← Zurück</button><button className="bb" style={{color:"var(--rd)"}} onClick={()=>setDid(p.id)}>🗑 Löschen</button></div>
    <div className="sc"><div style={{marginBottom:16}}><h2 className="st">Produkt-Info</h2></div>
      <div className="g2"><div className="fl"><label className="lb">Name</label><input className="inp" value={p.name} onChange={e=>up(p.id,{name:e.target.value})} placeholder="Produktname"/></div><div className="fl"><label className="lb">Link</label><div className="lw"><input className="inp" style={{paddingRight:30}} value={p.link} onChange={e=>up(p.id,{link:e.target.value})} placeholder="https://..."/>{p.link&&<a href={p.link} target="_blank" className="lbk">🔗</a>}</div></div></div>
      <div className="g4"><div className="fl"><label className="lb">VK (€)</label><input className="inm" type="number" value={p.sellPrice} onChange={e=>up(p.id,{sellPrice:e.target.value})} placeholder="0"/></div><div className="fl"><label className="lb">EK (€)</label><input className="inm" type="number" value={p.buyPrice} onChange={e=>up(p.id,{buyPrice:e.target.value})} placeholder="0"/></div><div className="fl"><label className="lb">Marge</label><div className="clc">{m}</div></div><div className="fl"><label className="lb">BE ROAS</label><div className="clc">{r}</div></div></div>
      <div className="fl"><label className="lb">Notizen</label><textarea className="inp" value={p.note} onChange={e=>up(p.id,{note:e.target.value})} rows={3} placeholder="Freitext..."/></div>
    </div>
    {/* BUNDLES */}
    <div className="sc">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 className="st">📦 Bundle-Preise <span className="bdg">{(p.bundles||[]).length}</span></h2><button className="bs" onClick={()=>{const b=(p.bundles||[]);up(p.id,{bundles:[...b,{id:uid(),name:`Bundle ${b.length+1}`,sellPrice:"",buyPrice:""}]})}}>+ Bundle</button></div>
      {!(p.bundles||[]).length&&<p style={{fontSize:13,color:"var(--t4)"}}>Keine Bundles. Füge Bundles hinzu für z.B. 2er oder 3er Sets.</p>}
      {(p.bundles||[]).map((b,bi)=>{const bm=cM(b.sellPrice,b.buyPrice);return <div key={b.id} className="acc" style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <input className="ins" style={{fontWeight:600,fontSize:13,width:200}} value={b.name} onChange={e=>{const nb=(p.bundles||[]).map(x=>x.id===b.id?{...x,name:e.target.value}:x);up(p.id,{bundles:nb})}} placeholder={`Bundle ${bi+1}`}/>
          <button className="bi" onClick={()=>up(p.id,{bundles:(p.bundles||[]).filter(x=>x.id!==b.id)})}>🗑</button>
        </div>
        <div className="g4">
          <div className="fl"><label className="lbs">VK (€)</label><input className="inm" type="number" value={b.sellPrice} onChange={e=>{const nb=(p.bundles||[]).map(x=>x.id===b.id?{...x,sellPrice:e.target.value}:x);up(p.id,{bundles:nb})}} placeholder="0"/></div>
          <div className="fl"><label className="lbs">EK (€)</label><input className="inm" type="number" value={b.buyPrice} onChange={e=>{const nb=(p.bundles||[]).map(x=>x.id===b.id?{...x,buyPrice:e.target.value}:x);up(p.id,{bundles:nb})}} placeholder="0"/></div>
          <div className="fl"><label className="lbs">Marge</label><div className="clc">{bm.m}</div></div>
          <div className="fl"><label className="lbs">BE ROAS</label><div className="clc">{bm.r}</div></div>
        </div>
      </div>})}
    </div>
    <div className="sc"><div style={{marginBottom:16}}><h2 className="st">Winning-Kriterien <span className="bdg">{ckS(p.checklist)}/10</span></h2></div>
      <div className="ckg">{CK.map(item=>{const on=p.checklist?.[item.k];return <label key={item.k} className="ckr" onClick={()=>up(p.id,{checklist:{...p.checklist,[item.k]:!on}})}><div className={`ck${on?" on":""}`}>{on&&<Chk/>}</div><span style={{color:on?"var(--tb)":"var(--t3)"}}>{item.l}</span></label>})}</div>
    </div>
    {/* COMPETITORS with ACCOUNTS */}
    <div className="sc"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 className="st">Competitors <span className="bdg">{p.competitors?.length||0}</span></h2><button className="bs" onClick={()=>aC(p.id)}>+ Competitor</button></div>
      {!p.competitors?.length&&<p style={{fontSize:13,color:"var(--t4)"}}>Noch keine.</p>}
      {p.competitors?.map((c,ci)=>{
        const totalAds=(c.accounts||[]).reduce((s,a)=>s+a.adHistory.length,0);
        const totalAccounts=(c.accounts||[]).length;
        return <div key={c.id} className="cc">
        <div className="ch" onClick={()=>setEc(pr=>({...pr,[c.id]:!pr[c.id]}))}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:10,color:"var(--t4)",fontFamily:"'JetBrains Mono',monospace"}}>#{ci+1}</span><span style={{fontSize:13,fontWeight:500,color:"var(--t)"}}>{c.name||"Unbenannt"}</span><span className="tg" style={{fontSize:10}}>{totalAccounts} Konto{totalAccounts!==1?"en":""}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><button className="bx" onClick={e=>{e.stopPropagation();setEa(pr=>({...pr,["chart_"+c.id]:!pr["chart_"+c.id]}))}} style={{color:"#818cf8",borderColor:"#818cf8"}}>📈 Analyse</button><button className="bi" onClick={e=>{e.stopPropagation();dC(p.id,c.id)}}>🗑</button></div>
        </div>
        {ea["chart_"+c.id]&&<div style={{padding:"12px",borderBottom:"1px solid var(--bd2)"}}><CompChart comp={c}/></div>}
        {ec[c.id]&&<div className="cb">
          <div className="g3" style={{marginBottom:8}}><div className="fl"><label className="lbs">Competitor Name</label><input className="ins" value={c.name} onChange={e=>uC(p.id,c.id,{name:e.target.value})} placeholder="Name"/></div><div className="fl"><label className="lbs">Website</label><div className="lw"><input className="ins" style={{paddingRight:28}} value={c.website} onChange={e=>uC(p.id,c.id,{website:e.target.value})} placeholder="https://..."/>{c.website&&<a href={c.website} target="_blank" className="lbk" style={{top:5}}>🔗</a>}</div></div><div className="fl"><label className="lbs">Beste Ad</label><div className="lw"><input className="ins" style={{paddingRight:28}} value={c.bestAdLink} onChange={e=>uC(p.id,c.id,{bestAdLink:e.target.value})} placeholder="https://..."/>{c.bestAdLink&&<a href={c.bestAdLink} target="_blank" className="lbk" style={{top:5}}>🔗</a>}</div></div></div>

          {/* WERBEKONTEN */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,marginBottom:6}}>
            <span className="lbs" style={{fontWeight:600,color:"var(--t2)"}}>📊 Werbekonten ({totalAccounts})</span>
            <button className="bx" onClick={()=>aAcc(p.id,c.id)}>+ Konto</button>
          </div>
          {(c.accounts||[]).map((acc,ai)=>(
            <div key={acc.id} className="acc">
              <div className="acc-head">
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,color:"var(--t4)"}}>Konto {ai+1}:</span>
                  <input className="ins" style={{width:140,padding:"3px 8px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}} value={acc.name} onChange={e=>uAcc(p.id,c.id,acc.id,{name:e.target.value})} placeholder="Kontoname"/>
                  <div className="lw" style={{display:"inline-flex",alignItems:"center"}}><input className="ins" style={{width:180,padding:"3px 8px"}} value={acc.link||""} onChange={e=>uAcc(p.id,c.id,acc.id,{link:e.target.value})} placeholder="https://fb.com/ads/..."/>{acc.link&&<a href={acc.link} target="_blank" rel="noopener noreferrer" style={{marginLeft:4,color:"var(--ac)",textDecoration:"none",fontSize:13,flexShrink:0}}>🔗</a>}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button className="bx" onClick={()=>setEa(pr=>({...pr,["achart_"+acc.id]:!pr["achart_"+acc.id]}))} style={{color:"#818cf8",borderColor:"#818cf8"}}>📈</button>
                  <button className="bx" onClick={()=>aAE(p.id,c.id,acc.id)}>+ Eintrag</button>
                  <button className="bi" onClick={()=>dAcc(p.id,c.id,acc.id)} style={{fontSize:10}}>🗑</button>
                </div>
              </div>
              {acc.adHistory.length>0&&<div style={{display:"flex",flexDirection:"column",gap:3}}>
                <div className="th"><span style={{flex:1.2}}>Datum</span><span style={{flex:1}}>Active</span><span style={{flex:1}}>Total</span><span style={{width:26}}/></div>
                {acc.adHistory.map(e=><div key={e.id} className="tr">
                  <input type="date" className="ti" style={{flex:1.2}} value={e.date} onChange={ev=>uAE(p.id,c.id,acc.id,e.id,{date:ev.target.value})}/>
                  <input type="number" className="ti" style={{flex:1}} value={e.active} onChange={ev=>uAE(p.id,c.id,acc.id,e.id,{active:ev.target.value})} placeholder="~"/>
                  <input type="number" className="ti" style={{flex:1}} value={e.total} onChange={ev=>uAE(p.id,c.id,acc.id,e.id,{total:ev.target.value})} placeholder="~"/>
                  <button className="bi" onClick={()=>dAE(p.id,c.id,acc.id,e.id)}>🗑</button>
                </div>)}
              </div>}
              {ea["achart_"+acc.id]&&acc.adHistory.length>=2&&<AdChart data={acc.adHistory} title={`${acc.name} – Verlauf`}/>}
            </div>
          ))}
        </div>}
      </div>})}
    </div>
    {/* OPTIONALE PRODUKTE */}
    <div className="sc">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:0,cursor:"pointer"}} onClick={()=>setEc(pr=>({...pr,_opt:!pr._opt}))}>
        <h2 className="st">🛒 Optionale Produkte <span className="bdg">{(p.optProducts||[]).length}</span></h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="bs" onClick={e=>{e.stopPropagation();up(p.id,{optProducts:[...(p.optProducts||[]),mk.optProd()]})}}>+ Produkt</button>
          <span style={{fontSize:12,color:"var(--t4)",transition:"transform .15s",transform:ec._opt?"rotate(90deg)":"rotate(0)"}}>▶</span>
        </div>
      </div>
      {ec._opt&&<div style={{marginTop:12}}>
        {!(p.optProducts||[]).length&&<p style={{fontSize:13,color:"var(--t4)"}}>Keine optionalen Produkte.</p>}
        {(p.optProducts||[]).map((op,oi)=>{const opm=cM(op.sellPrice,op.buyPrice);return <div key={op.id} className="acc" style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,color:"var(--t2)"}}>Produkt {oi+1}</span>
            <button className="bi" onClick={()=>up(p.id,{optProducts:(p.optProducts||[]).filter(x=>x.id!==op.id)})}>🗑</button>
          </div>
          <div className="g2" style={{marginBottom:8}}>
            <div className="fl"><label className="lbs">Name</label><input className="ins" value={op.name} onChange={e=>{const n2=(p.optProducts||[]).map(x=>x.id===op.id?{...x,name:e.target.value}:x);up(p.id,{optProducts:n2})}} placeholder="z.B. Upsell Produkt"/></div>
            <div className="fl"><label className="lbs">Link</label><div className="lw"><input className="ins" style={{paddingRight:28}} value={op.link} onChange={e=>{const n2=(p.optProducts||[]).map(x=>x.id===op.id?{...x,link:e.target.value}:x);up(p.id,{optProducts:n2})}} placeholder="https://..."/>{op.link&&<a href={op.link} target="_blank" className="lbk" style={{top:5}}>🔗</a>}</div></div>
          </div>
          <div className="g4">
            <div className="fl"><label className="lbs">VK (€)</label><input className="inm" style={{padding:"5px 8px",fontSize:12}} type="number" value={op.sellPrice} onChange={e=>{const n2=(p.optProducts||[]).map(x=>x.id===op.id?{...x,sellPrice:e.target.value}:x);up(p.id,{optProducts:n2})}} placeholder="0"/></div>
            <div className="fl"><label className="lbs">EK (€)</label><input className="inm" style={{padding:"5px 8px",fontSize:12}} type="number" value={op.buyPrice} onChange={e=>{const n2=(p.optProducts||[]).map(x=>x.id===op.id?{...x,buyPrice:e.target.value}:x);up(p.id,{optProducts:n2})}} placeholder="0"/></div>
            <div className="fl"><label className="lbs">Marge</label><div className="clc" style={{padding:"5px 8px",fontSize:12}}>{opm.m}</div></div>
            <div className="fl"><label className="lbs">BE ROAS</label><div className="clc" style={{padding:"5px 8px",fontSize:12}}>{opm.r}</div></div>
          </div>
        </div>})}
      </div>}
    </div>
    {did&&<Modal text="Produkt löschen?" onNo={()=>setDid(null)} onYes={()=>del(did)}/>}
  </div>}
  return <div className="pg"><div className="tp"><div><h1>Produkte</h1><p className="su">{products.length} Produkt{products.length!==1?"e":""}</p></div><button className="bp" onClick={add}>+ Neues Produkt</button></div>
    {!products.length?<Em i="📦" t="Noch keine Produkte" s="Füge dein erstes Produkt hinzu."/>:(<div className="gd">{products.map(p=>{const{m,r,x}=cM(p.sellPrice,p.buyPrice);const sc=ckS(p.checklist);const tAcc=p.competitors.reduce((s,c)=>s+(c.accounts||[]).length,0);return <div key={p.id} className="cd" onClick={()=>{setAid(p.id);setVw("detail")}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span className="cn">{p.name||"Unbenannt"}</span><button className="bi" onClick={e=>{e.stopPropagation();setDid(p.id)}}>🗑</button></div>
      <div className="g4s"><div><span className="ml">VK</span><div className="mv">{p.sellPrice?p.sellPrice+"€":"–"}</div></div><div><span className="ml">Marge</span><div className="mv">{m}</div></div><div><span className="ml">ROAS</span><div className="mv">{r}</div></div><div><span className="ml">Markup</span><div className="mv">{x}</div></div></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}><span style={{fontSize:12,color:"var(--t3)"}}><span style={{color:sc>=7?"var(--gn)":sc>=4?"var(--yl)":"var(--rd)"}}>●</span> {sc}/10</span><span className="tg">{p.competitors?.length||0} Comp. · {tAcc} Konten</span></div>
    </div>})}</div>)}
    {did&&<Modal text="Produkt löschen?" onNo={()=>setDid(null)} onYes={()=>del(did)}/>}
  </div>;
}

// ═══ ADS ═══
function AV({products,ads,set}){
  const [sp2,setSp2]=useState(null);const [sf,setSf]=useState(null);const [eid,setEid]=useState(null);const [adNt,setAdNt]=useState("");const [adFt,setAdFt]=useState(null);
  const pA=ads[sp2]||[];const f=pA.filter(a=>a.status==="fertig");const u=pA.filter(a=>a.status==="unfertig");
  const allAdTags=[...new Set(pA.flatMap(a=>a.tags||[]))];
  const sv=(pid,na)=>{set({...ads,[pid]:na})};
  const aA=s=>{const a={...mk.ad(),status:s};sv(sp2,[...pA,a]);setEid(a.id)};
  const uA=(id,ch)=>sv(sp2,pA.map(a=>a.id===id?{...a,...ch}:a));
  const dA=id=>{sv(sp2,pA.filter(a=>a.id!==id));if(eid===id)setEid(null)};
  const tS=id=>{const a=pA.find(x=>x.id===id);uA(id,{status:a.status==="fertig"?"unfertig":"fertig"})};
  const addAdTag=(id,t)=>{const tag=t.trim().toLowerCase();if(!tag)return;const a=pA.find(x=>x.id===id);if(!(a.tags||[]).includes(tag))uA(id,{tags:[...(a.tags||[]),tag]})};
  const rmAdTag=(id,t)=>{const a=pA.find(x=>x.id===id);uA(id,{tags:(a.tags||[]).filter(x=>x!==t)})};
  const filterAds=(list)=>adFt?list.filter(a=>(a.tags||[]).includes(adFt)):list;
  if(!sp2)return <div className="pg"><div className="tp"><h1>Ads</h1></div><p style={{fontSize:14,color:"var(--t3)",marginBottom:16}}>Wähle ein Produkt:</p>
    {!products.length?<Em i="📦" t="Keine Produkte"/>:(<div className="gd">{products.map(p=><div key={p.id} className="cd" onClick={()=>setSp2(p.id)}><span className="cn">{p.name||"Unbenannt"}</span><div style={{display:"flex",gap:8,marginTop:10}}><span className="tg" style={{background:"#166534",color:"#4ade80"}}>{(ads[p.id]||[]).filter(a=>a.status==="fertig").length} fertig</span><span className="tg" style={{background:"#78350f",color:"#fbbf24"}}>{(ads[p.id]||[]).filter(a=>a.status==="unfertig").length} unfertig</span></div></div>)}</div>)}</div>;
  const pr=products.find(p=>p.id===sp2);const cur=pA.find(a=>a.id===eid);
  if(eid&&cur)return <div className="pg"><div className="tp"><button className="bb" onClick={()=>setEid(null)}>← Zurück</button><button className="bb" style={{color:"var(--rd)"}} onClick={()=>dA(eid)}>🗑</button></div>
    <div className="sc"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 className="st">{cur.name||"Neue Ad"}<span className="bdg">{cur.status==="fertig"?"✓ Fertig":"◷ Unfertig"}</span></h2></div>
      <div className="g2"><div className="fl"><label className="lb">Name</label><input className="inp" value={cur.name} onChange={e=>uA(eid,{name:e.target.value})} placeholder="z.B. Broad - Senior"/></div><div className="fl"><label className="lb">Status</label><button className="stt" style={{background:cur.status==="fertig"?"#166534":"#92400e",borderColor:cur.status==="fertig"?"#22c55e":"#f59e0b"}} onClick={()=>tS(eid)}>{cur.status==="fertig"?"✓ Fertig → Unfertig":"◷ Unfertig → Fertig"}</button></div></div>
      <div className="fl"><label className="lb">Ad Typ</label><div className="tyr"><button className={`tyb${cur.adType==="video"?" on":""}`} onClick={()=>uA(eid,{adType:"video"})}>🎬 Video</button><button className={`tyb${cur.adType==="image"?" on":""}`} onClick={()=>uA(eid,{adType:"image"})}>🖼 Bild</button></div></div>
      <div style={{marginTop:10}}><MediaInput url={cur.mediaUrl} data={cur.mediaData||""} onUrlChange={v=>uA(eid,{mediaUrl:v})} onFileChange={v=>uA(eid,{mediaData:v})} type={cur.adType}/></div>
      {(cur.mediaData||cur.mediaUrl)&&<MP url={cur.mediaUrl} data={cur.mediaData} type={cur.adType}/>}
      <div className="dv"/><p className="sl">Tags / Kategorien</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{(cur.tags||[]).map(t=><span key={t} className="tp2">{t} <button style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",padding:0,marginLeft:2}} onClick={()=>rmAdTag(eid,t)}>×</button></span>)}</div>
      <div style={{display:"flex",gap:6,marginBottom:6}}><input className="inp" style={{flex:1}} value={adNt} onChange={e=>setAdNt(e.target.value)} placeholder="Tag hinzufügen (z.B. ABO, CBO, Broad, Retargeting)..." onKeyDown={e=>{if(e.key==="Enter"&&adNt.trim()){addAdTag(eid,adNt);setAdNt("")}}}/><button className="bs" onClick={()=>{if(adNt.trim()){addAdTag(eid,adNt);setAdNt("")}}}>+</button></div>
      {allAdTags.filter(t=>!(cur.tags||[]).includes(t)).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{allAdTags.filter(t=>!(cur.tags||[]).includes(t)).map(t=><button key={t} className="tsg" onClick={()=>addAdTag(eid,t)}>{t}</button>)}</div>}
      <div className="dv"/><p className="sl">Facebook-Zuordnung</p>
      <div className="g3"><div className="fl"><label className="lb">Kampagne</label><input className="inp" value={cur.campaign} onChange={e=>uA(eid,{campaign:e.target.value})} placeholder="CBO - Broad"/></div><div className="fl"><label className="lb">Ad Group</label><input className="inp" value={cur.adGroup} onChange={e=>uA(eid,{adGroup:e.target.value})} placeholder="18-65 DACH"/></div><div className="fl"><label className="lb">Creative</label><input className="inp" value={cur.static_name} onChange={e=>uA(eid,{static_name:e.target.value})} placeholder="Video_v2"/></div></div>
      <div className="dv"/><p className="sl">Ad Copy</p>
      <div className="fl"><label className="lb">Primary Text</label><textarea className="inp" value={cur.primaryText} onChange={e=>uA(eid,{primaryText:e.target.value})} rows={4} placeholder="Haupttext..."/></div>
      <div className="fl" style={{marginTop:10}}><label className="lb">Beschreibung</label><textarea className="inp" value={cur.description} onChange={e=>uA(eid,{description:e.target.value})} rows={2} placeholder="Beschreibung..."/></div>
    </div></div>;
  return <div className="pg"><div className="tp"><div style={{display:"flex",alignItems:"center",gap:10}}><button className="bb" onClick={()=>{setSp2(null);setSf(null)}}>←</button><div><h1>{pr?.name||"Ads"}</h1><p className="su">{f.length} fertig · {u.length} unfertig</p></div></div></div>
    <div style={{display:"flex",gap:10,marginBottom:20}}>{[{k:"fertig",l:"Fertige Ads",c:f.length,bg:"#166534",co:"#4ade80",bc:"#22c55e"},{k:"unfertig",l:"Unfertige Ads",c:u.length,bg:"#78350f",co:"#fbbf24",bc:"#f59e0b"}].map(x=><div key={x.k} className="fc" style={{borderColor:sf===x.k?x.bc:"var(--bd)"}} onClick={()=>setSf(sf===x.k?null:x.k)}><span style={{fontWeight:600,color:"var(--tb)",fontSize:13}}>📁 {x.l}</span><span className="tg" style={{background:x.bg,color:x.co}}>{x.c}</span></div>)}</div>
    {sf&&<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:14,fontWeight:600,color:"var(--t2)"}}>{sf==="fertig"?"Fertige":"Unfertige"} Ads</span><button className="bs" onClick={()=>aA(sf)}>+ Neue Ad</button></div>
      {allAdTags.length>0&&<div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}><span style={{fontSize:11,color:"var(--t4)",marginRight:4}}>🏷 Filter:</span><button className={`tf${!adFt?" on":""}`} onClick={()=>setAdFt(null)}>Alle</button>{allAdTags.map(t=><button key={t} className={`tf${adFt===t?" on":""}`} onClick={()=>setAdFt(adFt===t?null:t)}>{t}</button>)}</div>}
      {filterAds(sf==="fertig"?f:u).length===0?<p style={{fontSize:13,color:"var(--t4)"}}>Keine Ads.</p>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{filterAds(sf==="fertig"?f:u).map(ad=><div key={ad.id} className="ar" onClick={()=>setEid(ad.id)}><div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}><span style={{color:ad.adType==="video"?"#818cf8":"var(--t3)",flexShrink:0}}>{ad.adType==="video"?"🎬":"🖼"}</span><div style={{flex:1,minWidth:0}}><span style={{fontSize:13,fontWeight:500,color:"var(--tb)",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ad.name||"Unbenannt"}</span><div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>{(ad.campaign||ad.adGroup)&&<span style={{fontSize:10,color:"var(--t4)"}}>{[ad.campaign,ad.adGroup,ad.static_name].filter(Boolean).join(" → ")}</span>}{(ad.tags||[]).map(t=><span key={t} style={{fontSize:10,padding:"0 6px",borderRadius:3,background:"var(--ac)",color:"#fff",fontWeight:600}}>{t}</span>)}</div></div></div><div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><button className="stp" style={{background:ad.status==="fertig"?"#166534":"#78350f",color:ad.status==="fertig"?"#4ade80":"#fbbf24"}} onClick={e=>{e.stopPropagation();tS(ad.id)}}>{ad.status==="fertig"?"Fertig":"Unfertig"}</button><button className="bi" onClick={e=>{e.stopPropagation();dA(ad.id)}}>🗑</button></div></div>)}</div>}</div>}
  </div>;
}

// ═══ SWIPE ═══
function SV({boards,setBoards,items,setItems,allTags,setAllTags}){
  const [sb,setSb]=useState(null);const [eid,setEid]=useState(null);const [ft,setFt]=useState(null);const [nt,setNt]=useState("");const [eb,setEb]=useState(null);
  const aB=()=>{const b=mk.board();setBoards([...boards,b]);setEb(b.id)};
  const rB=(id,n)=>setBoards(boards.map(b=>b.id===id?{...b,name:n}:b));
  const dB=id=>{setBoards(boards.filter(b=>b.id!==id));setItems(items.filter(i=>i.boardId!==id));if(sb===id)setSb(null)};
  const aI=()=>{const i={...mk.swipe(),boardId:sb||""};setItems([i,...items]);setEid(i.id)};
  const uI=(id,ch)=>setItems(items.map(i=>i.id===id?{...i,...ch}:i));
  const dI=id=>{setItems(items.filter(i=>i.id!==id));if(eid===id)setEid(null)};
  const aT=t=>{const tag=t.trim().toLowerCase();if(tag&&!allTags.includes(tag))setAllTags([...allTags,tag]);return tag};
  const aTI=(iid,t)=>{const tag=aT(t);if(!tag)return;const it=items.find(i=>i.id===iid);if(!it.tags.includes(tag))uI(iid,{tags:[...it.tags,tag]})};
  const rTI=(iid,t)=>{const it=items.find(i=>i.id===iid);uI(iid,{tags:it.tags.filter(x=>x!==t)})};
  const fil=items.filter(i=>{if(sb&&i.boardId!==sb)return false;if(ft&&!i.tags.includes(ft))return false;return true});
  const cur=items.find(i=>i.id===eid);
  if(eid&&cur)return <div className="pg"><div className="tp"><button className="bb" onClick={()=>setEid(null)}>← Zurück</button><button className="bb" style={{color:"var(--rd)"}} onClick={()=>dI(eid)}>🗑</button></div>
    <div className="sc"><div style={{marginBottom:16}}><h2 className="st">{cur.name||"Neuer Eintrag"}</h2></div>
      <div className="g2"><div className="fl"><label className="lb">Name</label><input className="inp" value={cur.name} onChange={e=>uI(eid,{name:e.target.value})} placeholder="z.B. Hook-Idee XY"/></div><div className="fl"><label className="lb">Quelle</label><input className="inp" value={cur.source} onChange={e=>uI(eid,{source:e.target.value})} placeholder="Brand"/></div></div>
      <div className="g3"><div className="fl"><label className="lb">Media Typ</label><div className="tyr"><button className={`tyb${cur.mediaType==="image"?" on":""}`} onClick={()=>uI(eid,{mediaType:"image"})}>🖼 Bild</button><button className={`tyb${cur.mediaType==="video"?" on":""}`} onClick={()=>uI(eid,{mediaType:"video"})}>🎬 Video</button></div></div><div className="fl"><label className="lb">Plattform</label><div className="tyr"><button className={`tyb${cur.platform==="meta"?" on":""}`} onClick={()=>uI(eid,{platform:"meta"})}>Meta</button><button className={`tyb${cur.platform==="tiktok"?" on":""}`} onClick={()=>uI(eid,{platform:"tiktok"})}>TikTok</button><button className={`tyb${cur.platform==="other"?" on":""}`} onClick={()=>uI(eid,{platform:"other"})}>Andere</button></div></div><div className="fl"><label className="lb">Board</label><select className="inp" value={cur.boardId} onChange={e=>uI(eid,{boardId:e.target.value})}><option value="">Kein Board</option>{boards.map(b=><option key={b.id} value={b.id}>{b.name||"Unbenannt"}</option>)}</select></div></div>
      <MediaInput url={cur.mediaUrl} data={cur.mediaData||""} onUrlChange={v=>uI(eid,{mediaUrl:v})} onFileChange={v=>uI(eid,{mediaData:v})} type={cur.mediaType}/>
      {(cur.mediaData||cur.mediaUrl)&&<MP url={cur.mediaUrl} data={cur.mediaData} type={cur.mediaType}/>}
      <div style={{marginTop:14}}><div className="fl"><label className="lb">Tags</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{cur.tags.map(t=><span key={t} className="tp2">{t} <button style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",padding:0,marginLeft:2}} onClick={()=>rTI(eid,t)}>×</button></span>)}</div>
        <div style={{display:"flex",gap:6}}><input className="inp" style={{flex:1}} value={nt} onChange={e=>setNt(e.target.value)} placeholder="Tag..." onKeyDown={e=>{if(e.key==="Enter"&&nt.trim()){aTI(eid,nt);setNt("")}}}/><button className="bs" onClick={()=>{if(nt.trim()){aTI(eid,nt);setNt("")}}}>+</button></div>
        {allTags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>{allTags.filter(t=>!cur.tags.includes(t)).slice(0,12).map(t=><button key={t} className="tsg" onClick={()=>aTI(eid,t)}>{t}</button>)}</div>}
      </div></div>
      <div style={{marginTop:12}} className="fl"><label className="lb">Notizen</label><textarea className="inp" value={cur.notes} onChange={e=>uI(eid,{notes:e.target.value})} rows={4} placeholder="Hook, Angle, CTA..."/></div>
    </div></div>;
  return <div className="pg"><div className="tp"><div><h1>Swipe File</h1><p className="su">{items.length} gespeichert · {boards.length} Boards</p></div><div style={{display:"flex",gap:8}}><button className="bs" onClick={aB}>+ Board</button><button className="bp" onClick={aI}>+ Speichern</button></div></div>
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}><button className={`bch${!sb?" on":""}`} onClick={()=>setSb(null)}>📋 Alle ({items.length})</button>
      {boards.map(b=>{const c2=items.filter(i=>i.boardId===b.id).length;return <div key={b.id} style={{display:"flex",alignItems:"center"}}><button className={`bch${sb===b.id?" on":""}`} style={sb===b.id?{borderColor:b.color}:{}} onClick={()=>setSb(sb===b.id?null:b.id)}><span style={{width:8,height:8,borderRadius:"50%",background:b.color,flexShrink:0}}/>{eb===b.id?<input style={{background:"transparent",border:"none",color:"var(--tb)",fontSize:12,outline:"none",width:80}} value={b.name} onChange={e=>rB(b.id,e.target.value)} onBlur={()=>setEb(null)} onKeyDown={e=>e.key==="Enter"&&setEb(null)} autoFocus/>:<span onDoubleClick={()=>setEb(b.id)}>{b.name||"Unbenannt"} ({c2})</span>}</button><button className="bi" onClick={()=>dB(b.id)}>×</button></div>})}</div>
    {allTags.length>0&&<div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}><span style={{fontSize:11,color:"var(--t4)",marginRight:4}}>🏷 Filter:</span><button className={`tf${!ft?" on":""}`} onClick={()=>setFt(null)}>Alle</button>{allTags.map(t=><button key={t} className={`tf${ft===t?" on":""}`} onClick={()=>setFt(ft===t?null:t)}>{t}</button>)}</div>}
    {fil.length===0?<Em i="📌" t="Noch nichts gespeichert" s="Ads, Hooks, Pages – alles was inspiriert."/>:(<div className="swg">{fil.map(item=>{const board=boards.find(b=>b.id===item.boardId);const thumb=item.mediaData||item.mediaUrl;return <div key={item.id} className="swc" onClick={()=>setEid(item.id)}><div className="swt">{thumb?item.mediaType==="image"||(!item.mediaType||item.mediaType==="image")&&!thumb.startsWith("data:video")?<img src={thumb} alt="" onError={e=>e.target.style.display="none"}/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#6366f1"}}>▶</div>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--t4)"}}>{item.mediaType==="video"?"🎬":"🖼"}</div>}<span className="pb" style={{background:item.platform==="tiktok"?"#111":"#1a3a5c"}}>{item.platform==="tiktok"?"TT":"Meta"}</span></div><div style={{padding:"10px 12px"}}><span className="cn">{item.name||"Unbenannt"}</span>{item.source&&<span style={{fontSize:11,color:"var(--t4)",display:"block",marginTop:2}}>{item.source}</span>}<div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>{board&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:board.color+"22",color:board.color,fontWeight:600}}>{board.name}</span>}{item.tags.slice(0,3).map(t=><span key={t} style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"var(--bd)",color:"var(--t3)"}}>{t}</span>)}</div></div></div>})}</div>)}
  </div>;
}

// ═══ TODOS ═══
function TV({todos,set}){
  const [vm,setVm]=useState("list");
  const add=()=>set([mk.todo(),...todos]);const up=(id,ch)=>set(todos.map(t=>t.id===id?{...t,...ch}:t));const del=id=>set(todos.filter(t=>t.id!==id));
  const pen=todos.filter(t=>!t.done),don=todos.filter(t=>t.done);
  const wd=useMemo(()=>{const d=[];const n=new Date();const s=new Date(n);s.setDate(n.getDate()-n.getDay()+1);for(let i=0;i<7;i++){const x=new Date(s);x.setDate(s.getDate()+i);d.push(x.toISOString().split("T")[0])}return d},[]);
  const ov=pen.filter(t=>t.dueDate&&isO(t.dueDate)&&!isT(t.dueDate));
  return <div className="pg"><div className="tp"><div><h1>To-Dos</h1><p className="su">{pen.length} offen · {don.length} erledigt</p></div><div style={{display:"flex",gap:8}}><div className="tabr"><button className={`tab${vm==="list"?" on":""}`} onClick={()=>setVm("list")}>Liste</button><button className={`tab${vm==="week"?" on":""}`} onClick={()=>setVm("week")}>📅 Woche</button></div><button className="bp" onClick={add}>+ Aufgabe</button></div></div>
    {vm==="week"&&<div style={{marginBottom:20}}>
      {ov.length>0&&<div style={{marginBottom:14}}><p style={{fontSize:12,fontWeight:600,color:"var(--rd)",marginBottom:6}}>Überfällig ({ov.length})</p>{ov.map(t=><div key={t.id} className="mt" onClick={()=>up(t.id,{done:!t.done})}><div className={`cks${t.done?" on":""}`}>{t.done&&<Chk/>}</div><span style={{fontSize:12,color:"var(--t)"}}>{t.text||"..."}</span></div>)}</div>}
      <div className="wg">{wd.map(day=>{const dt=pen.filter(t=>t.dueDate===day);return <div key={day} className={`wc${isT(day)?" td":""}`}><div className="wh"><span style={{fontWeight:600,color:isT(day)?"var(--ac)":"var(--t2)",fontSize:12}}>{dN(day)}</span><span style={{fontSize:11,color:"var(--t4)",fontFamily:"'JetBrains Mono',monospace"}}>{fD(day)}</span></div>{dt.length===0?<p style={{fontSize:11,color:"var(--t4)",textAlign:"center",padding:"8px 0"}}>—</p>:dt.map(t=><div key={t.id} className="mt" onClick={()=>up(t.id,{done:!t.done})}><div className={`cks${t.done?" on":""}`}>{t.done&&<Chk/>}</div><span style={{fontSize:12,color:"var(--t)"}}>{t.text||"..."}</span></div>)}</div>})}</div></div>}
    {vm==="list"&&(!todos.length?<Em i="✓" t="Keine To-Dos"/>:<div style={{display:"flex",flexDirection:"column",gap:4}}>
      {pen.map(t=>{const o=t.dueDate&&isO(t.dueDate)&&!isT(t.dueDate);const it2=t.dueDate&&isT(t.dueDate);return <div key={t.id} className="tdr" style={{opacity:t.done?.45:1,borderColor:o?"#7f1d1d":it2?"#1e3a5f":"var(--bd)"}}>
        <div className={`ck${t.done?" on":""}`} onClick={()=>up(t.id,{done:!t.done})}>{t.done&&<Chk/>}</div>
        <input className="tdi" style={{textDecoration:t.done?"line-through":"none"}} value={t.text} onChange={e=>up(t.id,{text:e.target.value})} placeholder="Aufgabe..."/>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <input type="date" className="di" value={t.dueDate||""} onChange={e=>up(t.id,{dueDate:e.target.value})}/>
          {t.dueDate&&<span style={{fontSize:10,color:o?"var(--rd)":it2?"var(--ac)":"var(--t4)",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>{o?"Überfällig":it2?"Heute":`${dN(t.dueDate)} ${fD(t.dueDate)}`}</span>}
          <button className="bi" onClick={()=>del(t.id)}>🗑</button>
        </div>
      </div>})}
      {don.length>0&&<><p style={{fontSize:12,color:"var(--t4)",margin:"14px 0 6px",fontWeight:600}}>Erledigt ({don.length})</p>{don.map(t=><div key={t.id} className="tdr" style={{opacity:.45}}><div className="ck on" onClick={()=>up(t.id,{done:false})}><Chk/></div><input className="tdi" style={{textDecoration:"line-through"}} value={t.text} onChange={e=>up(t.id,{text:e.target.value})}/><button className="bi" onClick={()=>del(t.id)}>🗑</button></div>)}</>}
    </div>)}
  </div>;
}

// ═══ AVATARE ═══
const AVATAR_SECTIONS=[
  {k:"problems",l:"😰 Probleme & Schmerzen",ph:"Welches konkrete Problem hat er?",color:"#ef4444"},
  {k:"goals",l:"🎯 Ziele & Wünsche",ph:"Was will er erreichen? Traumzustand?",color:"#4ade80"},
  {k:"tested",l:"🔄 Bereits getestet",ph:"Was hat er schon probiert? Warum hat es nicht funktioniert?",color:"#f59e0b"},
  {k:"language",l:"💬 Kundensprache",ph:"Echte Zitate – so redet der Kunde über sein Problem",color:"#3b82f6"},
  {k:"objections",l:"🚫 Einwände",ph:"Warum kauft er NICHT? z.B. Zu teuer, kenne Marke nicht...",color:"#8b5cf6"},
  {k:"triggers",l:"⚡ Kauftrigger",ph:"Was bringt ihn zum Kauf? Vorher/Nachher, Rabatt, Bewertungen...",color:"#ec4899"},
  {k:"channels",l:"📱 Wo erreiche ich ihn?",ph:"Facebook, TikTok, Instagram? Welche Seiten/Interessen?",color:"#14b8a6"},
];

function AvV({products,avatars,set}){
  const [selProd,setSelProd]=useState(null);
  const [editId,setEditId]=useState(null);

  const pAv=avatars[selProd]||[];
  const sv=(pid,na)=>set({...avatars,[pid]:na});

  const addAv=()=>{
    const a={id:uid(),name:"Neuer Avatar",alter:"",geschlecht:"",beruf:"",familienstand:"",einkommen:"",notizen:"",
      problems:[],goals:[],tested:[],language:[],objections:[],triggers:[],channels:[]};
    sv(selProd,[...pAv,a]);setEditId(a.id);
  };
  const upAv=(id,ch)=>sv(selProd,pAv.map(a=>a.id===id?{...a,...ch}:a));
  const delAv=id=>{sv(selProd,pAv.filter(a=>a.id!==id));if(editId===id)setEditId(null)};

  const addListItem=(avId,key)=>{const av=pAv.find(a=>a.id===avId);upAv(avId,{[key]:[...(av[key]||[]),{id:uid(),text:""}]})};
  const upListItem=(avId,key,itemId,text)=>{const av=pAv.find(a=>a.id===avId);upAv(avId,{[key]:(av[key]||[]).map(i=>i.id===itemId?{...i,text}:i)})};
  const delListItem=(avId,key,itemId)=>{const av=pAv.find(a=>a.id===avId);upAv(avId,{[key]:(av[key]||[]).filter(i=>i.id!==itemId)})};

  // Product selection
  if(!selProd)return <div className="pg">
    <div className="tp"><h1>👤 Avatare</h1></div>
    <p style={{fontSize:14,color:"var(--t3)",marginBottom:16}}>Wähle ein Produkt um Kunden-Avatare zu erstellen:</p>
    {!products.length?<Em i="📦" t="Keine Produkte" s="Erstelle zuerst ein Produkt."/>:(
      <div className="gd">{products.map(p=><div key={p.id} className="cd" onClick={()=>setSelProd(p.id)}>
        <span className="cn">{p.name||"Unbenannt"}</span>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <span className="tg" style={{background:"#1e1b4b",color:"#818cf8"}}>{(avatars[p.id]||[]).length} Avatar{(avatars[p.id]||[]).length!==1?"e":""}</span>
        </div>
      </div>)}</div>
    )}
  </div>;

  const product=products.find(p=>p.id===selProd);
  const cur=pAv.find(a=>a.id===editId);

  // Avatar detail
  if(editId&&cur)return <div className="pg">
    <div className="tp"><button className="bb" onClick={()=>setEditId(null)}>← Zurück</button><button className="bb" style={{color:"var(--rd)"}} onClick={()=>delAv(editId)}>🗑 Löschen</button></div>

    {/* Grundinfos */}
    <div className="sc">
      <div style={{marginBottom:16}}><h2 className="st">👤 {cur.name||"Neuer Avatar"}</h2></div>
      <div className="g2">
        <div className="fl"><label className="lb">Avatar Name</label><input className="inp" value={cur.name} onChange={e=>upAv(editId,{name:e.target.value})} placeholder="z.B. Rentnerin mit Gehproblemen"/></div>
        <div className="fl"><label className="lb">Alter</label><input className="inp" value={cur.alter} onChange={e=>upAv(editId,{alter:e.target.value})} placeholder="z.B. 55-75"/></div>
      </div>
      <div className="g4">
        <div className="fl"><label className="lb">Geschlecht</label>
          <div className="tyr">
            <button className={`tyb${cur.geschlecht==="w"?" on":""}`} onClick={()=>upAv(editId,{geschlecht:"w"})}>Weiblich</button>
            <button className={`tyb${cur.geschlecht==="m"?" on":""}`} onClick={()=>upAv(editId,{geschlecht:"m"})}>Männlich</button>
            <button className={`tyb${cur.geschlecht==="d"?" on":""}`} onClick={()=>upAv(editId,{geschlecht:"d"})}>Alle</button>
          </div>
        </div>
        <div className="fl"><label className="lb">Beruf</label><input className="inp" value={cur.beruf} onChange={e=>upAv(editId,{beruf:e.target.value})} placeholder="z.B. Rentner, Hausfrau"/></div>
        <div className="fl"><label className="lb">Familienstand</label><input className="inp" value={cur.familienstand} onChange={e=>upAv(editId,{familienstand:e.target.value})} placeholder="z.B. Verheiratet"/></div>
        <div className="fl"><label className="lb">Einkommen</label><input className="inp" value={cur.einkommen} onChange={e=>upAv(editId,{einkommen:e.target.value})} placeholder="z.B. Mittel"/></div>
      </div>
    </div>

    {/* Dynamic Sections */}
    {AVATAR_SECTIONS.map(sec=>{
      const items=cur[sec.k]||[];
      return <div key={sec.k} className="sc">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h2 className="st" style={{fontSize:14}}><span style={{display:"inline-block",width:4,height:16,borderRadius:2,background:sec.color,marginRight:8}}/>{sec.l} <span className="bdg">{items.length}</span></h2>
          <button className="bx" onClick={()=>addListItem(editId,sec.k)}>+ Hinzufügen</button>
        </div>
        {items.length===0&&<p style={{fontSize:12,color:"var(--t4)",fontStyle:"italic"}}>{sec.ph}</p>}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {items.map((item,idx)=>(
            <div key={item.id} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:sec.color,fontWeight:700,flexShrink:0,width:18,textAlign:"right"}}>{idx+1}.</span>
              <input className="inp" style={{flex:1}} value={item.text} onChange={e=>upListItem(editId,sec.k,item.id,e.target.value)} placeholder={sec.ph}/>
              <button className="bi" onClick={()=>delListItem(editId,sec.k,item.id)}>🗑</button>
            </div>
          ))}
        </div>
      </div>;
    })}

    {/* Notizen */}
    <div className="sc">
      <div style={{marginBottom:12}}><h2 className="st" style={{fontSize:14}}>📝 Freitext-Notizen</h2></div>
      <textarea className="inp" value={cur.notizen||""} onChange={e=>upAv(editId,{notizen:e.target.value})} rows={4} placeholder="Weitere Gedanken zu diesem Avatar..."/>
    </div>
  </div>;

  // Avatar list for product
  return <div className="pg">
    <div className="tp">
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button className="bb" onClick={()=>{setSelProd(null);setEditId(null)}}>←</button>
        <div><h1>👤 {product?.name}</h1><p className="su">{pAv.length} Avatar{pAv.length!==1?"e":""}</p></div>
      </div>
      <button className="bp" onClick={addAv}>+ Neuer Avatar</button>
    </div>

    {pAv.length===0?<Em i="👤" t="Noch keine Avatare" s="Erstelle deinen ersten Kunden-Avatar für dieses Produkt."/>:(
      <div className="gd">{pAv.map(av=>{
        const totalItems=AVATAR_SECTIONS.reduce((s,sec)=>s+(av[sec.k]||[]).length,0);
        const filledSections=AVATAR_SECTIONS.filter(sec=>(av[sec.k]||[]).length>0).length;
        return <div key={av.id} className="cd" onClick={()=>setEditId(av.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span className="cn">👤 {av.name||"Unbenannt"}</span>
            <button className="bi" onClick={e=>{e.stopPropagation();delAv(av.id)}}>🗑</button>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {av.alter&&<span className="tg">{av.alter} J.</span>}
            {av.geschlecht&&<span className="tg">{av.geschlecht==="w"?"Weiblich":av.geschlecht==="m"?"Männlich":"Alle"}</span>}
            {av.beruf&&<span className="tg">{av.beruf}</span>}
          </div>
          {/* Progress bar */}
          <div style={{marginTop:4}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,color:"var(--t4)"}}>{filledSections}/7 Sektionen</span><span style={{fontSize:11,color:"var(--t4)"}}>{totalItems} Punkte</span></div>
            <div style={{height:4,background:"var(--bd)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:Math.round(filledSections/7*100)+"%",background:"var(--ac)",borderRadius:2}}/></div>
          </div>
          {/* Preview of filled sections */}
          <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
            {AVATAR_SECTIONS.filter(sec=>(av[sec.k]||[]).length>0).map(sec=><span key={sec.k} style={{width:8,height:8,borderRadius:"50%",background:sec.color}} title={sec.l}/>)}
          </div>
        </div>;
      })}</div>
    )}
  </div>;
}

// ═══ CHART (Aktien-style) ═══
function AdChart({data,title}){
  if(!data||data.length<2) return <p style={{fontSize:12,color:"var(--t4)",padding:12}}>Mindestens 2 Datenpunkte nötig.</p>;
  const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
  const W=500,H=200,P=40,PR=20,PT=20,PB=30;
  const actVals=sorted.map(d=>parseInt(d.active)||0);
  const totVals=sorted.map(d=>parseInt(d.total)||0);
  const allVals=[...actVals,...totVals];
  const minV=0,maxV=Math.max(...allVals,1)*1.1;
  const scX=(i)=>P+(i/(sorted.length-1))*(W-P-PR);
  const scY=(v)=>PT+(1-(v-minV)/(maxV-minV))*(H-PT-PB);
  const line=(vals,color)=>{
    const pts=vals.map((v,i)=>`${scX(i)},${scY(v)}`).join(" ");
    return <><polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {vals.map((v,i)=><circle key={i} cx={scX(i)} cy={scY(v)} r="4" fill={color} stroke="var(--bg3)" strokeWidth="2"/>)}</>
  };
  const gridLines=5;
  return <div style={{marginTop:8}}>
    {title&&<p style={{fontSize:13,fontWeight:600,color:"var(--tb)",marginBottom:8}}>{title}</p>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:600,background:"var(--bg)",borderRadius:8,border:"1px solid var(--bd)"}}>
      {/* Grid */}
      {Array.from({length:gridLines+1}).map((_,i)=>{const y=PT+i*(H-PT-PB)/gridLines;const v=Math.round(maxV-(i/gridLines)*(maxV-minV));return <g key={i}><line x1={P} y1={y} x2={W-PR} y2={y} stroke="var(--bd)" strokeWidth="0.5" strokeDasharray="4"/><text x={P-6} y={y+4} textAnchor="end" fontSize="9" fill="var(--t4)" fontFamily="'JetBrains Mono',monospace">{v}</text></g>})}
      {/* X labels */}
      {sorted.map((d,i)=><text key={i} x={scX(i)} y={H-8} textAnchor="middle" fontSize="9" fill="var(--t4)" fontFamily="'JetBrains Mono',monospace">{d.date.slice(5)}</text>)}
      {/* Lines */}
      {line(totVals,"#6366f1")}
      {line(actVals,"#4ade80")}
      {/* Legend */}
      <circle cx={P+10} cy={12} r="4" fill="#4ade80"/><text x={P+18} y={15} fontSize="10" fill="var(--t2)">Active</text>
      <circle cx={P+80} cy={12} r="4" fill="#6366f1"/><text x={P+88} y={15} fontSize="10" fill="var(--t2)">Total</text>
    </svg>
  </div>;
}

function CompChart({comp}){
  // Merge all account data for combined view
  const allData=(comp.accounts||[]).flatMap(a=>(a.adHistory||[]).map(h=>({...h,acc:a.name})));
  if(allData.length<2)return <p style={{fontSize:12,color:"var(--t4)",padding:8}}>Nicht genug Daten für ein Chart.</p>;
  const sorted=[...allData].sort((a,b)=>a.date.localeCompare(b.date));
  // Group by date, sum active+total
  const byDate={};
  sorted.forEach(d=>{if(!byDate[d.date])byDate[d.date]={date:d.date,active:0,total:0};byDate[d.date].active+=parseInt(d.active)||0;byDate[d.date].total+=parseInt(d.total)||0});
  const merged=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
  return <AdChart data={merged} title={`${comp.name} – Gesamt (alle Konten)`}/>;
}

// ═══ CONVERTER (PNG → WebP) ═══
function CV(){
  const [files,setFiles]=useState([]);
  const [format,setFormat]=useState("webp");
  const [quality,setQuality]=useState(80);
  const [results,setResults]=useState([]);
  const [converting,setConverting]=useState(false);

  const addFiles=()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.multiple=true;i.onchange=e=>{const fl=[...e.target.files].map(f=>({id:uid(),file:f,name:f.name,size:f.size,preview:URL.createObjectURL(f)}));setFiles(pr=>[...pr,...fl]);setResults([])};i.click()};
  const removeFile=id=>{setFiles(files.filter(f=>f.id!==id));setResults(results.filter(r=>r.id!==id))};

  const convertAll=async()=>{
    setConverting(true);setResults([]);
    const res=[];
    for(const f of files){
      const start=performance.now();
      try{
        const img=await createImageBitmap(f.file);
        const canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;
        const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0);
        const mime=format==="webp"?"image/webp":format==="jpeg"?"image/jpeg":"image/png";
        const blob=await new Promise(r=>canvas.toBlob(r,mime,quality/100));
        const url=URL.createObjectURL(blob);
        const ms=Math.round(performance.now()-start);
        const ext=format==="webp"?".webp":format==="jpeg"?".jpg":".png";
        const newName=f.name.replace(/\.[^.]+$/,"")+ext;
        res.push({id:f.id,name:newName,origSize:f.size,newSize:blob.size,url,ms,blob});
      }catch(err){res.push({id:f.id,name:f.name,error:true})}
    }
    setResults(res);setConverting(false);
  };

  const downloadOne=(r)=>{const a=document.createElement("a");a.href=r.url;a.download=r.name;a.click()};
  const downloadAll=()=>{results.filter(r=>!r.error).forEach(r=>downloadOne(r))};
  const fmtSize=b=>b<1024?b+" B":b<1024*1024?(b/1024).toFixed(1)+" KB":(b/(1024*1024)).toFixed(2)+" MB";
  const pctSaved=(o,n)=>{const p=Math.round((1-n/o)*100);return p>0?`-${p}%`:`+${Math.abs(p)}%`};

  const handleDrop=e=>{e.preventDefault();e.stopPropagation();const fl=[...e.dataTransfer.files].filter(f=>f.type.startsWith("image/")).map(f=>({id:uid(),file:f,name:f.name,size:f.size,preview:URL.createObjectURL(f)}));if(fl.length)setFiles(pr=>[...pr,...fl]);setResults([])};
  const handleDragOver=e=>{e.preventDefault();e.stopPropagation()};

  return <div className="pg">
    <div className="tp"><div><h1>🗜 Bild-Konverter</h1><p className="su">PNG, JPEG, WebP – kostenlos, lokal, keine Uploads</p></div></div>

    {/* Format & Quality */}
    <div className="sc">
      <div className="g3">
        <div className="fl"><label className="lb">Zielformat</label>

            <button className={`tyb${format==="webp"?" on":""}`} onClick={()=>setFormat("webp")}>WebP</button>
            <button className={`tyb${format==="jpeg"?" on":""}`} onClick={()=>setFormat("jpeg")}>JPEG</button>
            <button className={`tyb${format==="png"?" on":""}`} onClick={()=>setFormat("png")}>PNG</button>
          </div>
        </div>
        <div className="fl"><label className="lb">Qualität: {quality}%</label>
          <input type="range" min="10" max="100" step="5" value={quality} onChange={e=>setQuality(Number(e.target.value))} style={{width:"100%",accentColor:"var(--ac)"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--t4)"}}><span>10% (klein)</span><span>100% (max)</span></div>
        </div>
        <div className="fl"><label className="lb">Info</label>
          <div style={{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>
            {format==="webp"&&"WebP bietet die beste Komprimierung bei guter Qualität. Ideal für Web/Ads."}
            {format==="jpeg"&&"JPEG ist universell kompatibel. Gut für Fotos."}
            {format==="png"&&"PNG ist verlustfrei. Dateien werden größer."}
          </div>
        </div>
      </div>
    </div>

    {/* Drop Zone */}
    <div className="sc" onDrop={handleDrop} onDragOver={handleDragOver}>
      {files.length===0?
        <div style={{border:"2px dashed var(--bd)",borderRadius:12,padding:"50px 20px",textAlign:"center",cursor:"pointer"}} onClick={addFiles}>
          <div style={{fontSize:36,marginBottom:10}}>🖼</div>

        </div>
      :<div>
        {/* File list */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {files.map(f=>{
            const r=results.find(x=>x.id===f.id);
            return <div key={f.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",background:"var(--bg)",borderRadius:8,border:"1px solid var(--bd)"}}>
              <img src={f.preview} alt="" style={{width:48,height:48,objectFit:"cover",borderRadius:6,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:13,fontWeight:500,color:"var(--tb)",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                <span style={{fontSize:11,color:"var(--t4)"}}>{fmtSize(f.size)}</span>
                {r&&!r.error&&<span style={{fontSize:11,color:r.newSize<f.size?"var(--gn)":"var(--yl)",marginLeft:8}}>→ {fmtSize(r.newSize)} ({pctSaved(f.size,r.newSize)})</span>}
                {r&&r.error&&<span style={{fontSize:11,color:"var(--rd)",marginLeft:8}}>Fehler</span>}
              </div>
              {r&&!r.error&&<div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                <span style={{fontSize:11,color:"var(--gn)"}}>✓ {r.ms}ms</span>
                <button className="bs" onClick={()=>downloadOne(r)}>⬇ Download</button>
              </div>}
              <button className="bi" onClick={()=>removeFile(f.id)}>✕</button>
            </div>;
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
          <div style={{display:"flex",gap:8}}>
            <button className="bs" onClick={addFiles}>+ Weitere Bilder</button>
            <button className="bs" onClick={()=>{setFiles([]);setResults([])}}>Alle entfernen</button>
          </div>
          <div style={{display:"flex",gap:8}}>
            {results.length>0&&results.some(r=>!r.error)&&<button className="bp" onClick={downloadAll}>⬇ Alle speichern</button>}
            {results.length===0&&<button className="bp" onClick={convertAll} disabled={converting}>{converting?"Konvertiere...":"🔄 Konvertieren"}</button>}
          </div>
        </div>
      </div>}
    </div>
  </div>;
}

// ═══ SHARED ═══
function Em({i,t,s}){return <div className="empty"><div style={{fontSize:42,marginBottom:10}}>{i}</div><p style={{fontSize:16,color:"var(--t2)"}}>{t}</p>{s&&<p style={{fontSize:13,color:"var(--t4)"}}>{s}</p>}</div>}
function Modal({text,onNo,onYes}){return <div className="ov" onClick={onNo}><div className="mdl" onClick={e=>e.stopPropagation()}><p style={{fontSize:15,color:"var(--tb)",marginBottom:18}}>{text}</p><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button className="bs" onClick={onNo}>Abbrechen</button><button style={{background:"#dc2626",border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}} onClick={onYes}>Löschen</button></div></div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- POLANU AUTH SYSTEM – reines localStorage, kein Backend nötig -->
<!-- ══════════════════════════════════════════════ -->
<div id="auth-wall">
  <div class="auth-box" id="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">P</div>
      <div class="auth-logo-name">POLANU</div>
    </div>
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab on" id="tab-login" onclick="authTab('login')">Anmelden</button>
      <button class="auth-tab" id="tab-reg" onclick="authTab('register')">Registrieren</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="auth-field">
        <label class="auth-label">Benutzername</label>
        <input class="auth-input" id="l-user" placeholder="dein Username" autocomplete="username"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Passwort</label>
        <input class="auth-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="auth-btn" onclick="doLogin()">Anmelden</button>
      <div class="auth-msg" id="l-msg"></div>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">
      <div class="auth-field">
        <label class="auth-label">Benutzername</label>
        <input class="auth-input" id="r-user" placeholder="Wunsch-Username"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Passwort</label>
        <input class="auth-input" id="r-pass" type="password" placeholder="Mindestens 6 Zeichen"/>
      </div>
      <div class="auth-field">
        <label class="auth-label">Passwort wiederholen</label>
        <input class="auth-input" id="r-pass2" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"/>
      </div>
      <button class="auth-btn" onclick="doRegister()">Anfrage senden</button>
      <div class="auth-msg" id="r-msg"></div>
    </div>

    <!-- PENDING STATE -->
    <div id="form-pending" style="display:none" class="auth-pending">
      <div class="auth-pending-icon">⏳</div>
      <p>Deine Registrierung wartet auf <strong>Bestätigung durch den Admin</strong>.<br><br>
      Du wirst freigeschaltet sobald der Antrag genehmigt wurde.<br>
      Versuch es dann erneut anzumelden.</p>
      <button class="auth-btn" style="margin-top:20px" onclick="authTab('login')">Zum Login</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL (nur für Paul sichtbar nach Login) -->
<div id="admin-panel">
  <div class="admin-box">
    <div class="admin-title">
      <span>👑 Admin – Registrierungsanfragen</span>
      <button onclick="closeAdmin()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px">✕</button>
    </div>
    <div id="admin-list"></div>
    <div id="admin-empty" style="display:none;text-align:center;color:#64748b;font-size:13px;padding:20px">Keine offenen Anfragen.</div>
  </div>
</div>
<button class="admin-btn-open" id="admin-btn" onclick="openAdmin()">👑 Admin</button>

<script>
// ═══════════════════════════════════════════
// POLANU AUTH – Vollständiges System
// Daten liegen im localStorage des Browsers,
// der auf GitHub Pages liegt – also auf github.io.
// Damit alle Geräte dieselben Daten sehen,
// nutzen wir einen einfachen GitHub Gist als
// "Backend" (öffentlich lesbar, privat schreibbar).
//
// EINFACHERE VARIANTE (kein Gist nötig):
// Alle User-Daten im localStorage DES ADMINS.
// Andere Nutzer melden sich an, ihre Anfrage
// wird als "pending" gespeichert + Paul bekommt
// eine mailto-Email. Paul bestätigt manuell im
// Admin Panel und gibt dem Nutzer den Status "approved".
//
// Das funktioniert so:
// - Registrierung → Status "pending", Email an Paul
// - Paul öffnet Admin Panel → klickt Approve
// - Nutzer versucht Login → Status "approved" → Zugang
// ═══════════════════════════════════════════

const ADMIN_USER = "paul"; // ← Dein Username (klein)
const ADMIN_PASS = "master001"; // ← Dein Passwort (kannst du ändern)
const ADMIN_EMAIL = "schmidtpaul.ecom@gmail.com"; // ← Deine Email für Benachrichtigungen

const AUTH_KEY = "polanu-auth-users";
const SESSION_KEY = "polanu-session";

function getUsers() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY) || "[]"); } catch { return []; }
}
function saveUsers(u) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(u));
}
function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function setSession(u) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(u));
}

// Sicherer Hash (einfach aber ausreichend für diesen Zweck)
async function hashPass(pass) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass + "polanu-salt"));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = "auth-msg " + type;
}

function authTab(tab) {
  document.getElementById("tab-login").classList.toggle("on", tab === "login");
  document.getElementById("tab-reg").classList.toggle("on", tab === "register");
  document.getElementById("form-login").style.display = tab === "login" ? "" : "none";
  document.getElementById("form-register").style.display = tab === "register" ? "" : "none";
  document.getElementById("form-pending").style.display = "none";
}

async function doLogin() {
  const user = document.getElementById("l-user").value.trim().toLowerCase();
  const pass = document.getElementById("l-pass").value;
  if (!user || !pass) { showMsg("l-msg", "Bitte alle Felder ausfüllen.", "err"); return; }

  // Admin Hardcode
  if (user === ADMIN_USER) {
    if (pass === ADMIN_PASS) {
      grantAccess({ username: ADMIN_USER, role: "admin" });
      return;
    } else {
      showMsg("l-msg", "Falsches Passwort.", "err"); return;
    }
  }

  const users = getUsers();
  const h = await hashPass(pass);
  const found = users.find(u => u.username === user && u.passwordHash === h);
  if (!found) { showMsg("l-msg", "Unbekannter Nutzer oder falsches Passwort.", "err"); return; }
  if (found.status === "pending") {
    showMsg("l-msg", "Dein Account wartet noch auf Freischaltung.", "warn");
    document.getElementById("form-login").style.display = "none";
    document.getElementById("form-pending").style.display = "";
    return;
  }
  if (found.status === "rejected") { showMsg("l-msg", "Dein Account wurde abgelehnt.", "err"); return; }
  if (found.status === "approved") {
    grantAccess(found); return;
  }
  showMsg("l-msg", "Unbekannter Status.", "err");
}

async function doRegister() {
  const user = document.getElementById("r-user").value.trim().toLowerCase();
  const pass = document.getElementById("r-pass").value;
  const pass2 = document.getElementById("r-pass2").value;
  if (!user || !pass) { showMsg("r-msg", "Bitte alle Felder ausfüllen.", "err"); return; }
  if (user.length < 3) { showMsg("r-msg", "Username min. 3 Zeichen.", "err"); return; }
  if (pass.length < 6) { showMsg("r-msg", "Passwort min. 6 Zeichen.", "err"); return; }
  if (pass !== pass2) { showMsg("r-msg", "Passwörter stimmen nicht überein.", "err"); return; }
  if (user === ADMIN_USER) { showMsg("r-msg", "Dieser Username ist reserviert.", "err"); return; }

  const users = getUsers();
  if (users.find(u => u.username === user)) {
    showMsg("r-msg", "Username bereits vergeben.", "err"); return;
  }

  const h = await hashPass(pass);
  const newUser = {
    username: user,
    passwordHash: h,
    status: "pending",
    requestedAt: new Date().toISOString()
  };
  users.push(newUser);
  saveUsers(users);

  // Email an Paul senden (öffnet Mail-Client)
  const subject = encodeURIComponent("[POLANU] Neue Registrierungsanfrage: " + user);
  const body = encodeURIComponent(
    "Hallo Paul,\n\n" +
    "Ein neuer Nutzer möchte Zugang zu POLANU:\n\n" +
    "  Username: " + user + "\n" +
    "  Datum: " + new Date().toLocaleString("de-DE") + "\n\n" +
    "Paul wird mit absender dieser Email benachrichtigt und kann dich somit freischalten 👍.\n\n" +
    "Dein POLANU Team"
  );
  
  // Versuche Email zu öffnen
  try {
    window.location.href = "mailto:" + ADMIN_EMAIL + "?subject=" + subject + "&body=" + body;
  } catch(e) {}

  showMsg("r-msg", "Anfrage gesendet! Warte auf Bestätigung.", "ok");
  setTimeout(() => {
    document.getElementById("form-register").style.display = "none";
    document.getElementById("form-pending").style.display = "";
  }, 1500);
}

function grantAccess(user) {
  setSession(user);
  const wall = document.getElementById("auth-wall");
  const root = document.getElementById("root");
  const btn = document.getElementById("admin-btn");
  if (wall) wall.setAttribute("style", "display:none!important");
  if (root) root.setAttribute("style", "display:block!important");
  if (btn && (user.role === "admin" || user.username === ADMIN_USER)) {
    btn.setAttribute("style", "display:block!important");
  }
}

function openAdmin() {
  const panel = document.getElementById("admin-panel");
  panel.style.display = "flex";
  renderAdminList();
}

function closeAdmin() {
  document.getElementById("admin-panel").style.display = "none";
}

function renderAdminList() {
  const users = getUsers();
  const list = document.getElementById("admin-list");
  const empty = document.getElementById("admin-empty");
  list.innerHTML = "";
  if (users.length === 0) {
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";
  users.forEach(u => {
    const row = document.createElement("div");
    row.className = "admin-row";
    const date = new Date(u.requestedAt).toLocaleString("de-DE");
    let actionHtml = "";
    if (u.status === "pending") {
      actionHtml = `
        <div class="admin-actions">
          <button class="admin-approve" onclick="approveUser('${u.username}')">✓ Freischalten</button>
          <button class="admin-reject" onclick="rejectUser('${u.username}')">✕ Ablehnen</button>
        </div>`;
    } else if (u.status === "approved") {
      actionHtml = `<span class="admin-approved">✓ Freigeschaltet</span>`;
    } else if (u.status === "rejected") {
      actionHtml = `<span class="admin-rejected">✕ Abgelehnt</span>`;
    }
    row.innerHTML = `
      <div>
        <div class="admin-name">${u.username}</div>
        <div class="admin-meta">${date} · Status: ${u.status}</div>
      </div>
      ${actionHtml}
    `;
    list.appendChild(row);
  });
}

function approveUser(username) {
  const users = getUsers();
  const idx = users.findIndex(u => u.username === username);
  if (idx >= 0) { users[idx].status = "approved"; saveUsers(users); renderAdminList(); }
}

function rejectUser(username) {
  const users = getUsers();
  const idx = users.findIndex(u => u.username === username);
  if (idx >= 0) { users[idx].status = "rejected"; saveUsers(users); renderAdminList(); }
}

// App-Root initial verstecken
document.getElementById("root").style.display = "none";

// Session prüfen beim Laden
window.addEventListener("load", () => {
  const session = getSession();
  if (session && session.username) {
    grantAccess(session);
  }
});
</script>
</body>
</html>
